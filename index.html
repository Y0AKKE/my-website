<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>ARTGOTKILLED</title>
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'VT323', monospace;
  min-height: 100vh;
  overflow: hidden;
  cursor: crosshair;
  color: #e0e0d0;
}

/* VIDEO BG */
#bg {
  position: fixed;
  inset: 0;
  z-index: -1;
}
#bg video {
  width: 100%; height: 100%;
  object-fit: cover;
}
#bg::after {
  content: '';
  position: absolute;
  inset: 0;
  background: #111;
  z-index: -1;
}

/* TITLE */
#title {
  position: fixed;
  top: 20px;
  left: 24px;
  font-size: clamp(1.4rem, 4vw, 2.4rem);
  letter-spacing: .15em;
  color: #e0e0d0;
  mix-blend-mode: difference;
  user-select: none;
  line-height: 1;
}
#title a { color: inherit; text-decoration: none; }

/* WELCOME TEXT — center */
#welcome {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
  user-select: none;
}

#welcome p {
  font-size: clamp(1.2rem, 5vw, 4rem);
  letter-spacing: .3em;
  color: #e0e0d0;
  mix-blend-mode: difference;
  text-transform: uppercase;
  line-height: 1.6;
}


/* NAV — bottom right */
#nav {
  position: fixed;
  bottom: 24px;
  right: 28px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: .4rem;
}
#nav a {
  font-size: 1.2rem;
  letter-spacing: .25em;
  color: rgba(224,224,208,.55);
  text-decoration: none;
  text-transform: uppercase;
  transition: color .1s;
  line-height: 1.2;
}
#nav a:hover { color: #e0e0d0; }


/* SOCIALS — bottom left */
#socials {
  position: fixed;
  bottom: 24px;
  left: 28px;
  display: flex;
  flex-direction: column;
  gap: .4rem;
}
#socials a {
  font-size: 1rem;
  letter-spacing: .2em;
  color: rgba(224,224,208,.4);
  text-decoration: none;
  text-transform: uppercase;
  transition: color .1s;
}
#socials a:hover { color: #e0e0d0; }

/* URL tag — top right */
#tag {
  position: fixed;
  top: 24px;
  right: 28px;
  font-size: .75rem;
  letter-spacing: .3em;
  color: rgba(224,224,208,.18);
  text-transform: uppercase;
}

#quote {
  position: fixed;
 top: calc(50% + 110px);
  left: 50%;
  transform: translateX(-50%);
  font-size: 1rem;
  letter-spacing: .2em;
  color: #e0e0d0;
  mix-blend-mode: difference;
  text-transform: uppercase;
  text-align: center;
  white-space: nowrap;
}
</style>
</head>
<body>

<div id="bg">
  <video autoplay muted loop playsinline>
    <source src="bg.mp4" type="video/mp4">
  </video>
</div>

<div id="title">
  <a href="index.html">ARTGOTKILLED</a>
</div>

<div id="tag">artgotkilled.com</div>

<div id="welcome">
  <p>welcome to<br>art got killed</p>
</div>

<div id="nav">
  <a href="radio.html">RADIO</a>
  <a href="#">WORKS</a>        <!-- link when ready -->
  <a href="#">ABOUT</a>        <!-- link when ready -->
  <a href="#">CONTACT</a>      <!-- link when ready -->
</div>

<div id="socials">
  <a href="https://www.instagram.com/artgotkilled">INSTAGRAM</a>    <!-- replace # with your URL -->
  <a href="https://www.youtube.com/@ArtGotKilledOfficial">YOUTUBE</a>
  <a href="#">ARE.NA</a>
</div>
<div id="quote"></div>

<script>

const quotes = [
  "art is dead and we killed it",
  "everything is content",
  "is this original?",
  "call your mother today and tell her you love her",
    "minecraft",
    "very cool",
    "ily :3",

  // add your own here
];

const q = quotes[Math.floor(Math.random() * quotes.length)];
document.getElementById('quote').textContent = q;
</script>
</body>
</html>
